name: Retail Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with pylint (optional)
      continue-on-error: true
      run: |
        pip install pylint
        pylint main.py --fail-under=8.0 || true

    - name: Run tests with pytest
      run: |
        pytest test_pipeline.py -v --tb=short

    - name: Generate coverage report
      run: |
        pip install pytest-cov
        pytest test_pipeline.py --cov=main --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        files: ./coverage.xml
        flags: unittests

  pipeline:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline
      run: |
        python main.py

    - name: Verify outputs
      run: |
        if [ -f revenue.csv ] && [ -f daily_sales.csv ]; then
          echo "✅ Pipeline outputs generated successfully"
          echo "Revenue by category:"
          cat revenue.csv
          echo ""
          echo "Daily sales:"
          cat daily_sales.csv
        else
          echo "❌ Pipeline failed to generate outputs"
          exit 1
        fi

    - name: Archive results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pipeline-results
        path: |
          revenue.csv
          daily_sales.csv

  notify:
    needs: [test, pipeline]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Pipeline Status
      run: |
        if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.pipeline.result }}" = "success" ]; then
          echo "✅ All checks passed!"
          exit 0
        else
          echo "❌ Pipeline failed"
          exit 1
        fi
