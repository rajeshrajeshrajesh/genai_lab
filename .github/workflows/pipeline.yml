name: Retail Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint

      - name: Lint with pylint
        continue-on-error: true
        run: |
          pylint main.py --fail-under=8.0

      - name: Run tests
        run: |
          pytest test_pipeline.py -v --tb=short

      - name: Generate coverage
        run: |
          pytest test_pipeline.py --cov=main --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage.xml

  pipeline:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py

      - name: Verify outputs
        run: |
          if [ -f revenue.csv ] && [ -f daily_sales.csv ]; then
            echo "✅ Pipeline outputs generated successfully"
            echo "Revenue:"
            cat revenue.csv
            echo ""
            echo "Daily sales:"
            cat daily_sales.csv
          else
            echo "❌ Missing output files"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: |
            revenue.csv
            daily_sales.csv

  notify:
    needs: [test, pipeline]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Pipeline Status
        run: |
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.pipeline.result }}" = "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Pipeline failed"
            exit 1
          fi