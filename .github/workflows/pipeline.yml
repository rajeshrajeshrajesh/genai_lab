name: Retail Pipeline CI/CD

on:
  push:
    branches:
      - "**"   
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # 🔹 Stage 2: Lint
  lint:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: pip install pylint

      - name: Run Lint
        continue-on-error: true
        run: pylint main.py --fail-under=8.0

  # 🔹 Stage 3: Test (Parallel Matrix)
  test:
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Test Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests
        run: pytest test_pipeline.py -v

      - name: Generate Coverage
        run: pytest test_pipeline.py --cov=main --cov-report=xml

  # 🔹 Stage 4: Run Pipeline
  run-pipeline:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: pip install -r requirements.txt

      - name: Execute Pipeline
        run: python main.py

      # 🔥 Save outputs for next stages
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            revenue.csv
            daily_sales.csv

  # 🔹 Stage 5: Validate Output
  validate:
    needs: run-pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Download Outputs
        uses: actions/download-artifact@v4
        with:
          name: pipeline-output

      - name: Validate Files
        run: |
          if [ -f revenue.csv ] && [ -f daily_sales.csv ]; then
            echo "✅ Outputs exist"
          else
            echo "❌ Missing outputs"
            exit 1
          fi

  # 🔹 Stage 6: Final Artifact Storage
  artifact:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Download Outputs
        uses: actions/download-artifact@v4
        with:
          name: pipeline-output

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: |
            revenue.csv
            daily_sales.csv

  # 🔹 Stage 7: Notify
  notify:
    needs: [build, lint, test, run-pipeline, validate, artifact]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Final Status
        run: |
          echo "✅ CI/CD Pipeline Completed"